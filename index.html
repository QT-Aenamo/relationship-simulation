<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relationship Simulation - Persona Lab</title>
    <style>
        /* 대장님을 위한 싱그러운 파스텔 그린 테마 */
        body {
            margin: 0; padding: 0;
            font-family: 'Pretendard', -apple-system, sans-serif;
            /* 배경: 아주 연한 민트빛 화이트 */
            background-color: #f0f4f2; 
            display: flex; justify-content: center; align-items: center;
            height: 100vh; overflow: hidden;
        }

        /* 오버레이: 반투명한 흰색으로 배경을 부드럽게 */
        .modal-overlay {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.7);
            display: flex; justify-content: center; align-items: center;
            z-index: 9999;
            backdrop-filter: blur(5px); /* 약간의 블러 효과로 감성 추가 */
        }

        /* 모달 카드: 깨끗한 화이트에 부드러운 그림자 */
        .modal-card {
            background: white;
            padding: 20px;
            border-radius: 0;
            width: 200%; max-width: 1500px;
            max-height: 90vh;      /* Add this line */
            overflow-y: auto;      /* Add this line */
            box-shadow: 0 15px 35px rgba(100, 120, 110, 0.15);
            border: 1px solid #e2eee8;
        }

        .modal-header { 
            color: #8da399; 
            font-size: 0.85rem; 
            margin-bottom: 8px; 
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        h2 { 
            margin: 0 0 25px 0; 
            font-size: 1.6rem; 
            color: #3e4d44; 
            font-weight: 800; 
            letter-spacing: -0.5px;
        }
        h3 { 
            margin: 0 0 25px 0; 
            font-size: 1rem; 
            color: #3e4d44; 
            font-weight: 800; 
            letter-spacing: -0.5px;
        }

        /* 입력창: 연한 그린 보더 */
        textarea {
            width: 100%; height: 90px;
            border: 1.5px solid #e6efea; border-radius: 16px;
            padding: 15px; box-sizing: border-box;
            font-size: 0.95rem; background: #fafdfc;
            resize: none; margin-bottom: 15px;
            transition: all 0.3s;
            color: #4a5a51;
        }

        textarea:focus {
            outline: none; border-color: #a8d5ba; 
            background: white; box-shadow: 0 0 10px rgba(168, 213, 186, 0.2);
        }

        .input-row { display: flex; gap: 8px; margin-bottom: 15px; }
        
        input[type="text"] {
            flex: 1; border: 1.5px solid #e6efea; border-radius: 12px;
            padding: 12px; font-size: 0.95rem; background: #fafdfc;
            color: #4a5a51;
        }

        /* 버튼: 차분한 파스텔 그린 */
        .btn-recommend {
            background: #e9f5ee; border: none; border-radius: 12px;
            padding: 0 15px; color: #5a7a6a; cursor: pointer; 
            font-weight: 700; font-size: 0.85rem;
            transition: background 0.2s;
        }
        .btn-recommend:hover { background: #d7ede1; }

        .preset-tag {
            display: inline-block; background: #fff; border: 1.5px solid #f0f7f3;
            padding: 7px 14px; border-radius: 20px; font-size: 0.8rem;
            color: #7a9185; margin-right: 5px; cursor: pointer; transition: 0.2s;
            font-weight: 600;
        }
        .preset-tag:hover { background: #f0f7f3; color: #4a5a51; }

        .setting-item {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 15px; font-size: 0.95rem; color: #5a6a61;
            font-weight: 600;
        }

        /* 토글: 활성화 시 딥그린 */
        .toggle-group button {
            border: 1.5px solid #f0f7f3; background: white;
            padding: 9px 18px; cursor: pointer; font-size: 0.85rem;
            color: #9db2a7; font-weight: 700; transition: all 0.2s;
        }
        .toggle-group button.active { 
            background: #6da082; color: white; border-color: #6da082; 
        }
        .toggle-group button:first-child { border-radius: 12px 0 0 12px; }
        .toggle-group button:last-child { border-radius: 0 12px 12px 0; }

        /* 생성 버튼: 신뢰감을 주는 포레스트 그린 */
        .btn-generate {
            width: 50%; 
            display: block;
            margin: 20px auto;
            background: #5a8d71; 
            color: white; 
        border: none;
        border-radius: 8px; 
        padding: 12px; 
        font-size: 1.05rem;
        font-weight: 800; 
        cursor: pointer;
        box-shadow: 0 8px 20px rgba(90, 141, 113, 0.2);
        transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn-generate:hover { 
            transform: translateY(-2px);
            box-shadow: 0 12px 25px rgba(90, 141, 113, 0.3);
        }
    </style>
</head>
<body>

<div id="modalOverlay" class="modal-overlay">
    <div class="modal-card">
        <div class="modal-header">관계 시뮬레이션</div>
        <h2>시뮬레이션 설정</h2>
        <h3>페르소나</h3>
        <textarea id="charTrait" placeholder="대화할 상대의 성격을 상세히 묘사하세요..."></textarea>
        <h3>상황</h3>
        <textarea id="situation" placeholder="대화할 상황을 상세히 묘사하세요..."></textarea>

        <div class="input-row">
            <input type="text" id="charName" placeholder="페르소나 이름">
            <button class="btn-recommend">이름 추천</button>
        </div>

        <div class="settings">
            <div class="setting-item">
                <span>기본 어투</span>
                <div class="toggle-group">
                    <button class="active">존댓말</button>
                    <button>반말</button>
                </div>
            </div>
            <div class="setting-item">
                <span>선공 설정</span>
                <div class="toggle-group">
                    <button class="active">내가 먼저</button>
                    <button>상대가 먼저</button>
                </div>
            </div>
        </div>

        <button class="btn-generate">페르소나 생성하기</button>
    </div>
</div>

</body>
</html>
