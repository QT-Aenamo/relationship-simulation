<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relationship Simulation - Persona Lab</title>
    <style>
        /* 파스텔 그린 테마 */
        body {
            margin: 0; padding: 0;
            font-family: 'Pretendard', -apple-system, sans-serif;
            /* (뒤에 있는) 배경: 아주 연한 민트빛 화이트 */
            background-color: #f0f4f2; 
            display: flex; justify-content: center; align-items: center;
            height: 100vh; overflow: hidden;
        }

        /* 카드 그림자 */
        .modal-overlay {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.7);
            display: flex; justify-content: center; align-items: center;
            z-index: 9999;
            backdrop-filter: blur(5px);
        }

        /* 흰 배경 */
        .modal-card {
            background: white;
            padding: 20px;
            border-radius: 0;
            width: 200%; max-width: 1500px;
            box-shadow: 0 15px 35px rgba(100, 120, 110, 0.15);
            border: 1px solid #e2eee8;
        }

        .modal-header { 
            color: #8da399; 
            font-size: 0.85rem; 
            margin-bottom: 8px; 
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        h2 { 
            margin: 0 0 25px 0; 
            font-size: 1.6rem; 
            color: #3e4d44; 
            font-weight: 800; 
            letter-spacing: -0.5px;
        }
        h3 { 
            margin: 0 0 25px 0; 
            font-size: 1rem; 
            color: #3e4d44; 
            font-weight: 800; 
            letter-spacing: -0.5px;
        }

        /* 입력창: 연한 그린 보더 */
        textarea {
            width: 100%; height: 90px;
            border: 1.5px solid #e6efea; border-radius: 16px;
            padding: 15px; box-sizing: border-box;
            font-size: 0.95rem; background: #fafdfc;
            resize: none; margin-bottom: 15px;
            transition: all 0.3s;
            color: #4a5a51;
        }

        textarea:focus {
            outline: none; border-color: #a8d5ba; 
            background: white; box-shadow: 0 0 10px rgba(168, 213, 186, 0.2);
        }

        .input-row { display: flex; gap: 8px; margin-bottom: 15px; }
        
        input[type="text"] {
            flex: 1; border: 1.5px solid #e6efea; border-radius: 12px;
            padding: 12px; font-size: 0.95rem; background: #fafdfc;
            color: #4a5a51;
        }

        /* 버튼: 파스텔 그린 */
        .btn-recommend {
            background: #e9f5ee; border: none; border-radius: 12px;
            padding: 10px 60px; color: #5a7a6a; cursor: pointer; 
            font-weight: 700; font-size: 0.95rem;
            transition: background 0.2s;
        }
        .btn-recommend:hover { background: #d7ede1; }

        .preset-tag {
            display: inline-block; background: #fff; border: 1.5px solid #f0f7f3;
            padding: 7px 14px; border-radius: 20px; font-size: 0.8rem;
            color: #7a9185; margin-right: 5px; cursor: pointer; transition: 0.2s;
            font-weight: 600;
        }
        .preset-tag:hover { background: #f0f7f3; color: #4a5a51; }

        .setting-item {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 15px; font-size: 0.95rem; color: #5a6a61;
            font-weight: 600;
        }

        /* 토글: 활성화 시 딥그린 */
        .toggle-group button {
            border: 1.5px solid #f0f7f3; background: white;
            padding: 9px 18px; cursor: pointer; font-size: 0.85rem;
            color: #9db2a7; font-weight: 700; transition: all 0.2s;
        }
        .toggle-group button.active { 
            background: #6da082; color: white; border-color: #6da082; 
        }
        .toggle-group button:first-child { border-radius: 12px 0 0 12px; }
        .toggle-group button:last-child { border-radius: 0 12px 12px 0; }

        /* 생성 버튼: 포레스트 그린 */
        .btn-generate {
            width: 50%; 
            display: block;
            margin: 20px auto;
            background: #5a8d71; 
            color: white; 
        border: none;
        border-radius: 8px; 
        padding: 12px; 
        font-size: 1.05rem;
        font-weight: 800; 
        cursor: pointer;
        box-shadow: 0 8px 20px rgba(90, 141, 113, 0.2);
        transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn-generate:hover { 
            transform: translateY(-2px);
            box-shadow: 0 12px 25px rgba(90, 141, 113, 0.3);
        }
        /* 커스텀 팝업 스타일 */
        .custom-modal {
            display: none; position: fixed; top: 0; left: 0;
            width: 100%; height: 100%; background: rgba(0, 0, 0, 0.4);
            z-index: 10000; justify-content: center; align-items: center;
            backdrop-filter: blur(3px);
        }
        .modal-content {
            background: white; padding: 30px; border-radius: 20px;
            width: 90%; max-width: 400px; text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border: 1px solid #e2eee8;
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes popIn {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        .modal-content p { color: #4a5a51; font-weight: 600; margin-bottom: 20px; }
        .btn-close {
            background: #5a8d71; color: white; border: none;
            padding: 10px 25px; border-radius: 10px; cursor: pointer;
            font-weight: 800; transition: background 0.2s;
        }
        .btn-close:hover { background: #4a7a60; }
    </style>
</head>


<body>
<div id="modalOverlay" class="modal-overlay">
    <div class="modal-card">
        <div class="modal-header">관계 시뮬레이션</div>
        <h2>시뮬레이션 설정</h2>
        <h3>페르소나</h3>
        <textarea id="charTrait" placeholder="대화할 상대의 성격을 상세히 묘사하세요..."></textarea>
        <h3>상황</h3>
        <textarea id="situation" placeholder="대화할 상황을 상세히 묘사하세요..."></textarea>

        <div class="input-row">
            <input type="text" id="charName" placeholder="페르소나 이름">
            <button class="btn-recommend">이름 추천</button>
        </div>

        <div class="settings">
            <div class="setting-item">
                <span>기본 어투</span>
                <div class="toggle-group">
                    <button class="active">존댓말</button>
                    <button>반말</button>
                </div>
            </div>
            <div class="setting-item">
                <span>선공 설정</span>
                <div class="toggle-group">
                    <button class="active">내가 먼저</button>
                    <button>상대가 먼저</button>
                </div>
            </div>
        </div>

        <button class="btn-generate">페르소나 생성하기</button>
    </div>
</div>

<div id="customModal" class="custom-modal">
    <div class="modal-content">
        <p id="modalMessage">여기에 메시지가 뜹니다.</p>
        <button class="btn-close" onclick="closeModal()">확인</button>
    </div>
</div>
</body>
<script>
    // 1. 한국어 조사 판별 함수 (그레고르와! 이상과!)
    function getJosa(name, type) {
        if (!name) return name;
        const charCode = name.charCodeAt(name.length - 1);
        if (charCode < 44032 || charCode > 55203) return name + (type === '와과' ? '와' : '를');
        const hasLastLetter = (charCode - 44032) % 28 !== 0;
        if (type === '와과') return hasLastLetter ? name + '과' : name + '와';
        return hasLastLetter ? name + '을' : name + '를';
    }

    // 2. 예쁜 팝업(모달) 제어 함수
    function showModal(msg) {
        const modal = document.getElementById('customModal');
        const modalMessage = document.getElementById('modalMessage');
        if (modal && modalMessage) {
            modalMessage.innerText = msg;
            modal.style.display = 'flex';
        } else {
            // 혹시 모달 HTML을 아직 안 만드셨을 경우를 대비한 보험
            alert(msg);
        }
    }

    function closeModal() {
        document.getElementById('customModal').style.display = 'none';
    }

    // 3. 설정 변수
    let config = {
        charTrait: "",
        situation: "",
        charName: "",
        speechStyle: "존댓말",
        firstTurn: "내가 먼저"
    };

    window.onload = function() {
        // 토글 버튼 상호작용
        const toggleGroups = document.querySelectorAll('.toggle-group');
        toggleGroups.forEach((group, index) => {
            const buttons = group.querySelectorAll('button');
            buttons.forEach(btn => {
                btn.onclick = function() {
                    buttons.forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    if (index === 0) config.speechStyle = this.innerText;
                    else config.firstTurn = this.innerText;
                };
            });
        });

        // 이름 추천 버튼
        const recommendBtn = document.querySelector('.btn-recommend');
        recommendBtn.onclick = function() {
            const names = ["그레고르", "싱클레어", "홍루", "이상", "파우스트"];
            const randomName = names[Math.floor(Math.random() * names.length)];
            document.getElementById('charName').value = randomName;
            config.charName = randomName;
        };

        // 생성하기 버튼 (alert 대신 showModal 사용!)
        const generateBtn = document.querySelector('.btn-generate');
        generateBtn.onclick = function() {
            config.charTrait = document.getElementById('charTrait').value;
            config.situation = document.getElementById('situation').value;
            config.charName = document.getElementById('charName').value;

            if (!config.charTrait || !config.situation) {
                showModal("성격과 상황을 모두 입력해야 시뮬레이션을 시작할 수 있습니다.");
                return;
            }

            const josaName = getJosa(config.charName, '와과');
            showModal(`${josaName}의 시뮬레이션을 준비합니다!`);
        };
    };
</script>
</html>
