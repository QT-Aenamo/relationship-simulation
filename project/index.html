<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relationship Simulation - Persona Lab</title>
    <style>
        /* 파스텔 그린 테마 */
        body {
            margin: 0; padding: 0;
            font-family: 'Pretendard', -apple-system, sans-serif;
            /* (뒤에 있는) 배경: 아주 연한 민트빛 화이트 */
            background-color: #f0f4f2; 
            display: flex; justify-content: center; align-items: center;
            height: 100vh; overflow: hidden;
        }

        /* 카드 그림자 */
        .modal-overlay {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.7);
            display: flex; justify-content: center; align-items: center;
            z-index: 9999;
            backdrop-filter: blur(5px);
        }

        /* 흰 배경 */
        .modal-card {
            background: white;
            padding: 20px;
            border-radius: 0;
            width: 200%; max-width: 1500px;
            box-shadow: 0 15px 35px rgba(100, 120, 110, 0.15);
            border: 1px solid #e2eee8;
        }

        .modal-header { 
            color: #8da399; 
            font-size: 0.85rem; 
            margin-bottom: 8px; 
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        h2 { 
            margin: 0 0 25px 0; 
            font-size: 1.6rem; 
            color: #3e4d44; 
            font-weight: 800; 
            letter-spacing: -0.5px;
        }
        h3 { 
            margin: 0 0 25px 0; 
            font-size: 1rem; 
            color: #3e4d44; 
            font-weight: 800; 
            letter-spacing: -0.5px;
        }

        /* 입력창: 연한 그린 보더 */
        textarea {
            width: 100%; height: 90px;
            border: 1.5px solid #e6efea; border-radius: 16px;
            padding: 15px; box-sizing: border-box;
            font-size: 0.95rem; background: #fafdfc;
            resize: none; margin-bottom: 15px;
            transition: all 0.3s;
            color: #4a5a51;
        }

        textarea:focus {
            outline: none; border-color: #a8d5ba; 
            background: white; box-shadow: 0 0 10px rgba(168, 213, 186, 0.2);
        }

        .input-row { display: flex; gap: 8px; margin-bottom: 15px; }
        
        input[type="text"] {
            flex: 1; border: 1.5px solid #e6efea; border-radius: 12px;
            padding: 12px; font-size: 0.95rem; background: #fafdfc;
            color: #4a5a51;
        }

        /* 버튼: 파스텔 그린 */
        .btn-recommend {
            background: #e9f5ee; border: none; border-radius: 12px;
            padding: 10px 60px; color: #5a7a6a; cursor: pointer; 
            font-weight: 700; font-size: 0.95rem;
            transition: background 0.2s;
        }
        .btn-recommend:hover { background: #d7ede1; }

        .preset-tag {
            display: inline-block; background: #fff; border: 1.5px solid #f0f7f3;
            padding: 7px 14px; border-radius: 20px; font-size: 0.8rem;
            color: #7a9185; margin-right: 5px; cursor: pointer; transition: 0.2s;
            font-weight: 600;
        }
        .preset-tag:hover { background: #f0f7f3; color: #4a5a51; }

        .setting-item {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 15px; font-size: 0.95rem; color: #5a6a61;
            font-weight: 600;
        }

        /* 토글: 활성화 시 딥그린 */
        .toggle-group button {
            border: 1.5px solid #f0f7f3; background: white;
            padding: 9px 18px; cursor: pointer; font-size: 0.85rem;
            color: #9db2a7; font-weight: 700; transition: all 0.2s;
        }
        .toggle-group button.active { 
            background: #6da082; color: white; border-color: #6da082; 
        }
        .toggle-group button:first-child { border-radius: 12px 0 0 12px; }
        .toggle-group button:last-child { border-radius: 0 12px 12px 0; }

        /* 생성 버튼: 포레스트 그린 */
        .btn-generate {
            width: 50%; 
            display: block;
            margin: 20px auto;
            background: #5a8d71; 
            color: white; 
        border: none;
        border-radius: 8px; 
        padding: 12px; 
        font-size: 1.05rem;
        font-weight: 800; 
        cursor: pointer;
        box-shadow: 0 8px 20px rgba(90, 141, 113, 0.2);
        transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn-generate:hover { 
            transform: translateY(-2px);
            box-shadow: 0 12px 25px rgba(90, 141, 113, 0.3);
        }
        /* 커스텀 팝업 스타일 */
        .custom-modal {
            display: none; position: fixed; top: 0; left: 0;
            width: 100%; height: 100%; background: rgba(0, 0, 0, 0.4);
            z-index: 10000; justify-content: center; align-items: center;
            backdrop-filter: blur(3px);
        }
        .modal-content {
            background: white; padding: 30px; border-radius: 20px;
            width: 90%; max-width: 400px; text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border: 1px solid #e2eee8;
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes popIn {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        .modal-content p { color: #4a5a51; font-weight: 600; margin-bottom: 20px; }
        .btn-close {
            background: #5a8d71; color: white; border: none;
            padding: 10px 25px; border-radius: 10px; cursor: pointer;
            font-weight: 800; transition: background 0.2s;
        }
        .btn-close:hover { background: #4a7a60; }
        /* 대화창 컨테이너 */
        /* 기존 .chat-screen 수정 */
        .chat-screen {
            display: none; /* 처음엔 숨김 */
            width: 95%; max-width: 1200px; height: 90vh; /* 사진처럼 넓게 설정 */
            background: white; border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(100, 120, 110, 0.1);
            border: 1px solid #e2eee8;
            position: relative;
            z-index: 10001; /* 설정창보다 위에 오도록 */
        }

        /* 내부 컨테이너 배치 */
        .chat-container {
            display: flex; width: 100%; height: 100%;
        }

        /* 1. 대화 구역: 세로로 쌓이고 빈틈없이 채우기 */
        .chat-main { 
           flex: 7; 
            display: flex; 
            flex-direction: column; /* 요소들을 위아래로 배치 */
            height: 100%; 
        }

        /* 2. 대화 기록창: 남은 공간을 다 차지해서 입력창을 아래로 밀어내기 */
        #chatHistory {
            flex: 1; /* 이 설정이 있어야 입력창이 아래로 내려갑니다 */
            overflow-y: auto;
            padding: 20px;
        }

        /* 3. 입력창 구역: 맨 아래에 딱 붙이기 */
        .chat-input-area {
            margin-top: auto; /* 위쪽 여백을 최대로 해서 아래로 밀기 */
            padding: 20px;
            background: white;
            border-top: 1px solid #e6efea;
            display: flex;
            gap: 10px;
        }

        .chat-sidebar {
            flex: 3; background: #f8fbf9; padding: 25px;
            display: flex; flex-direction: column; gap: 30px;
            min-width: 250px;
        }
        /* 바 배경 (회색 길) */
        .stat-bar-bg { 
            width: 100%; height: 8px; background: #eef2f0; 
            border-radius: 4px; overflow: hidden; 
        }

        /* 바 채우기 (색상 게이지) */
        .stat-bar-fill { 
            height: 100%; transition: width 0.6s ease; 
            border-radius: 4px; 
        }

        /* 라벨 정렬 */
        .stat-label { 
            display: flex; justify-content: space-between; 
            font-size: 0.85rem; margin-bottom: 8px; 
            color: #4a5a51; font-weight: 700; 
        }
        #chatTitle {
            margin: 20px 0 10px 40px; /* 위 20px, 오른쪽 0, 아래 10px, 왼쪽 40px */
            font-size: 1.2rem;
            color: #3e4d44;
            font-weight: 800;
        }
    </style>
</head>


<body>
    <div id="modalOverlay" class="modal-overlay">
        <div class="modal-card">
            <div class="modal-header">관계 시뮬레이션</div>
            <h2>시뮬레이션 설정</h2>
            <h3>페르소나</h3>
            <textarea id="charTrait" placeholder="대화할 상대의 성격을 상세히 묘사하세요..."></textarea>
            <h3>상황</h3>
            <textarea id="situation" placeholder="대화할 상황을 상세히 묘사하세요..."></textarea>

            <div class="input-row">
                <input type="text" id="charName" placeholder="페르소나 이름">
                <button class="btn-recommend">이름 추천</button>
            </div>

            <div class="settings">
                <div class="setting-item">
                    <span>기본 어투</span>
                    <div class="toggle-group">
                        <button class="active">존댓말</button>
                        <button>반말</button>
                    </div>
                </div>
                <div class="setting-item">
                    <span>선공 설정</span>
                    <div class="toggle-group">
                        <button class="active">내가 먼저</button>
                        <button>상대가 먼저</button>
                    </div>
                </div>
            </div>

            <button class="btn-generate">페르소나 생성하기</button>
        </div>
    </div>

    <div id="customModal" class="custom-modal">
        <div class="modal-content">
            <p id="modalMessage">여기에 메시지가 뜹니다.</p>
            <button class="btn-close" onclick="closeModal()">확인</button>
        </div>
    </div>

    <div id="chatScreen" class="chat-screen">
        <div class="chat-container">
            <div class="chat-main">
                <div class="chat-header"><h4 id="chatTitle">이름</h4></div>
                <div id="chatHistory" class="chat-history"></div>
                <div class="chat-input-area">
                    <input type="text" id="userInput" placeholder="메시지를 입력하세요... (Enter 전송)">
                    <button class="btn-recommend" id="sendBtn">전송</button>
                </div>
            </div>

            <div class="chat-sidebar">
                <div class="sidebar-section">
                    <h5>실시간 스탯</h5>
                    <div class="stat-item">
                        <div class="stat-label"><span>호감도</span><span id="val-likability">50</span></div>
                        <div class="stat-bar-bg"><div id="bar-likability" class="stat-bar-fill" style="width: 50%; background: #4457ff;"></div></div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label"><span>신뢰도</span><span id="val-trust">50</span></div>
                        <div class="stat-bar-bg"><div id="bar-trust" class="stat-bar-fill" style="width: 50%; background: #3ae8b1;"></div></div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label"><span>긴장감</span><span id="val-tension">50</span></div>
                        <div class="stat-bar-bg"><div id="bar-tension" class="stat-bar-fill" style="width: 50%; background: #ffcc99;"></div></div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label"><span>방어기제</span><span id="val-defense">50</span></div>
                        <div class="stat-bar-bg"><div id="bar-defense" class="stat-bar-fill" style="width: 50%; background: #ff8b8b;"></div></div>
                    </div>
                </div>
                <div class="sidebar-section">
                    <h5>페르소나 정보</h5>
                    <div id="personaDesc" style="font-size: 0.9rem; color: #5a6a61; line-height: 1.6; min-height: 50px;">
                        </div>
                </div>

                <div class="sidebar-section">
                    <h5>키워드</h5>
                    <div id="keywordGroup" class="keyword-group">
                        </div>
                </div>
            </div>
        </div>
    </div>
</body>
<script>
    // 1. 한국어 조사 판별 함수 (그레고르와! 이상과!)
    function getJosa(name, type) {
        if (!name) return name;
        const charCode = name.charCodeAt(name.length - 1);
        if (charCode < 44032 || charCode > 55203) return name + (type === '와과' ? '와' : '를');
        const hasLastLetter = (charCode - 44032) % 28 !== 0;
        if (type === '와과') return hasLastLetter ? name + '과' : name + '와';
        return hasLastLetter ? name + '을' : name + '를';
    }

    // 2. 예쁜 팝업(모달) 제어 함수
    function showModal(msg) {
        const modal = document.getElementById('customModal');
        const modalMessage = document.getElementById('modalMessage');
        if (modal && modalMessage) {
            modalMessage.innerText = msg;
            modal.style.display = 'flex';
        } else {
            // 혹시 모달 HTML을 아직 안 만드셨을 경우를 대비한 보험
            alert(msg);
        }
    }

    function closeModal() {
        // 1. 팝업 닫기
        document.getElementById('customModal').style.display = 'none';
    
        // 2. 기존 설정창(모달 오버레이) 숨기기
        document.getElementById('modalOverlay').style.display = 'none';
    
        // 3. 대화창 나타내기 (flex로 설정해야 사이드바가 옆으로 붙습니다)
        const chatScreen = document.getElementById('chatScreen');
        chatScreen.style.display = 'flex'; 
    
        // 4. 이름 동기화
        document.getElementById('chatTitle').innerText = config.charName;
    }

    // 3. 설정 변수
    let config = {
        charTrait: "",
        situation: "",
        charName: "",
        speechStyle: "존댓말",
        firstTurn: "내가 먼저"
    };

    window.onload = function() {
        // 토글 버튼 상호작용
        const toggleGroups = document.querySelectorAll('.toggle-group');
        toggleGroups.forEach((group, index) => {
            const buttons = group.querySelectorAll('button');
            buttons.forEach(btn => {
                btn.onclick = function() {
                    buttons.forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    if (index === 0) config.speechStyle = this.innerText;
                    else config.firstTurn = this.innerText;
                };
            });
        });

        // 이름 추천 버튼
        const recommendBtn = document.querySelector('.btn-recommend');
        recommendBtn.onclick = function() {
            const names = ["그레고르", "싱클레어", "홍루", "이상", "파우스트"];
            const randomName = names[Math.floor(Math.random() * names.length)];
            document.getElementById('charName').value = randomName;
            config.charName = randomName;
        };

        // 생성하기 버튼 (alert 대신 showModal 사용!)
        const generateBtn = document.querySelector('.btn-generate');
        generateBtn.onclick = function() {
            config.charTrait = document.getElementById('charTrait').value;
            config.situation = document.getElementById('situation').value;
            config.charName = document.getElementById('charName').value;

            if (!config.charTrait || !config.situation) {
                showModal("성격과 상황을 모두 입력해야 시뮬레이션을 시작할 수 있습니다.");
                return;
            }

            const josaName = getJosa(config.charName, '와과');
            showModal(`${josaName}의 시뮬레이션을 준비합니다!`);
        };
    };
</script>
</html>
